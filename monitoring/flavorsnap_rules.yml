groups:
  - name: flavorsnap_alerts
    rules:
      # Health check alerts
      - alert: FlavorSnapDown
        expr: up{job=~"flavorsnap-(blue|green)"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "FlavorSnap instance is down"
          description: "FlavorSnap {{ $labels.job }} has been down for more than 1 minute."

      - alert: HealthCheckFailure
        expr: flask_health_check_status == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Health check failing"
          description: "Health check for {{ $labels.job }} has been failing for 2 minutes."

      # Performance alerts
      - alert: HighErrorRate
        expr: rate(flask_http_request_exceptions_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} errors per second for {{ $labels.job }}."

      - alert: HighResponseTime
        expr: flask_http_request_duration_seconds{quantile="0.95"} > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High response time"
          description: "95th percentile response time is {{ $value }}s for {{ $labels.job }}."

      # Queue alerts
      - alert: QueueBacklog
        expr: queue_pending_tasks > 1000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Queue backlog detected"
          description: "Queue has {{ $value }} pending tasks for {{ $labels.job }}."

      - alert: QueueProcessingStalled
        expr: increase(queue_processed_tasks_total[10m]) == 0
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "Queue processing stalled"
          description: "No tasks processed in the last 15 minutes for {{ $labels.job }}."

      - alert: HighQueueFailureRate
        expr: rate(queue_failed_tasks_total[5m]) / rate(queue_completed_tasks_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High queue failure rate"
          description: "Queue failure rate is {{ $value | humanizePercentage }} for {{ $labels.job }}."

      # Database alerts
      - alert: DatabaseConnectionFailure
        expr: flask_database_connections == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Database connection failure"
          description: "No database connections available for {{ $labels.job }}."

      - alert: HighDatabaseLatency
        expr: flask_database_query_duration_seconds{quantile="0.95"} > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High database latency"
          description: "95th percentile database query time is {{ $value }}s for {{ $labels.job }}."

      # Cache alerts
      - alert: CacheHitRateLow
        expr: rate(cache_hits_total[5m]) / (rate(cache_hits_total[5m]) + rate(cache_misses_total[5m])) < 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low cache hit rate"
          description: "Cache hit rate is {{ $value | humanizePercentage }} for {{ $labels.job }}."

      # Memory alerts
      - alert: HighMemoryUsage
        expr: (process_resident_memory_bytes / 1024 / 1024) > 1000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value }}MB for {{ $labels.job }}."

      - alert: MemoryLeakSuspected
        expr: increase(process_resident_memory_bytes[1h]) > 100000000
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Memory leak suspected"
          description: "Memory usage increased by {{ $value | humanizeBytes }} in the last hour for {{ $labels.job }}."

      # Deployment alerts
      - alert: DeploymentRollback
        expr: deployment_status == 3
        for: 0m
        labels:
          severity: info
        annotations:
          summary: "Deployment rolled back"
          description: "Deployment {{ $labels.deployment_id }} was rolled back: {{ $labels.rollback_reason }}."

      - alert: DeploymentFailed
        expr: deployment_status == 4
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Deployment failed"
          description: "Deployment {{ $labels.deployment_id }} failed: {{ $labels.error_message }}."

      # Blue-green deployment alerts
      - alert: BlueGreenDeploymentMismatch
        expr: blue_deployment_status != green_deployment_status
        for: 0m
        labels:
          severity: info
        annotations:
          summary: "Blue-green deployment status mismatch"
          description: "Blue deployment status: {{ $labels.blue_deployment_status }}, Green deployment status: {{ $labels.green_deployment_status }}."

      - alert: ZeroDowntimeDeploymentFailure
        expr: zero_downtime_deployment_success == 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Zero-downtime deployment failed"
          description: "Zero-downtime deployment failed for {{ $labels.deployment_id }}."
