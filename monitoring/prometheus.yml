global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "flavorsnap_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # FlavorSnap Blue Environment
  - job_name: 'flavorsnap-blue'
    static_configs:
      - targets: ['flavorsnap-blue:5000']
    metrics_path: '/queue/export'
    params:
      format: ['prometheus']
    scrape_interval: 30s
    scrape_timeout: 10s

  # FlavorSnap Green Environment
  - job_name: 'flavorsnap-green'
    static_configs:
      - targets: ['flavorsnap-green:5000']
    metrics_path: '/queue/export'
    params:
      format: ['prometheus']
    scrape_interval: 30s
    scrape_timeout: 10s

  # PostgreSQL metrics
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']

  # Redis metrics
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  # Nginx metrics
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']

  # Node Exporter (if available)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
